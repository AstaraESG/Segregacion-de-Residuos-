<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Dónde lo boto? | astara</title>
<meta name="description" content="Busca cualquier residuo y descubre en qué tacho va: orgánicos, generales o reciclables.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="assets/logo-gris.png">
</head>
<body>

<header class="hero">
  <img class="hero__motif hero__motif--right" src="assets/curva-astara.png" alt="" aria-hidden="true">
  <img class="hero__motif hero__motif--left" src="assets/curva-astara.png" alt="" aria-hidden="true">
  <div class="hero__inner">
    <img class="hero__logo" src="assets/logo-blanco.png" alt="astara">
    <h1>¿Dónde lo <span class="accent">boto</span>?</h1>
    <p class="hero__sub">Escribe lo que tienes en la mano y te decimos en qué tacho va.</p>

    <form id="search-form" class="searchbar" autocomplete="off">
      <svg class="searchbar__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
        <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input
        id="search-input"
        type="text"
        placeholder="ej. vaso de café, botella, cáscara de plátano..."
        aria-label="Buscar residuo"
        maxlength="60"
      >
      <button type="submit" class="searchbar__btn">Buscar</button>
    </form>
  </div>
</header>

<main class="wrap">
  <section id="result-area" class="result-area" aria-live="polite"></section>

  <section id="idle-hint" class="idle-hint">
    <p>Prueba con:</p>
    <div class="chips">
      <button type="button" class="chip" data-example="vaso de café">vaso de café</button>
      <button type="button" class="chip" data-example="botella de plástico">botella de plástico</button>
      <button type="button" class="chip" data-example="cáscara de fruta">cáscara de fruta</button>
      <button type="button" class="chip" data-example="pilas">pilas</button>
    </div>
  </section>
</main>

<footer class="footer">
  <p>¿Algo no cuadra o no aparece tu residuo?</p>
  <a href="mailto:micaela.paez.a@astara.com?cc=alejandra.arroyo.d@astara.com&subject=Sugerencia%20para%20%C2%BFD%C3%B3nde%20lo%20boto%3F">Escríbenos</a>
</footer>

<script src="app.js"></script>
</body>
</html>
